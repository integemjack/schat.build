name: Qt Desktop

# Packages the Qt6/QML desktop (desktop/desktop-qt) — the replacement for the deleted Electron
# client — for all 3 desktop OSes and both CPU families (x86_64 + arm64).
#
#   macOS   : Universal2 (arm64 + x86_64 in one fat .app) — .dmg via macdeployqt, built on a
#             single Apple-Silicon runner (GitHub retired the Intel macos-13 runner)
#   Windows : x64 (MSYS2/MINGW64)                    — NSIS installer via windeployqt + makensis
#             (arm64 needs an MSVC port of the vendored MinGW deps — not covered yet)
#   Linux   : x86_64 + aarch64 (Debian trixie containers) — .deb (both arches)
#             + a self-contained AppImage on x86_64 (linuxdeploy + plugin-qt)
#
# The macOS leg is build-verified locally; the Windows/Linux legs are proven by this workflow.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ireoo/Secret-Chat 的分支或标签"
        required: false
        # 打包只用 `main`(版本分支开发完成后合并进 main);要临时打某版本分支就显式传 ref 覆盖。
        default: "main"
  # Reusable: build.yml's "Build All" calls this (uses:) so the MAIN release bundles the Qt
  # desktop packages — one combined release, single source of truth. This workflow has NO
  # release job of its own; the caller publishes. Standalone workflow_dispatch above still runs
  # the full multi-arch build for desktop-only test builds (uploads artifacts, no release).
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        default: "main"

permissions:
  contents: write

# Supersede an in-flight run on a new push (iteration-friendly; these are heavy multi-arch builds).
concurrency:
  group: qt-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  SRC_REPO: Ireoo/Secret-Chat
  # `inputs` context is populated for BOTH workflow_dispatch and workflow_call.
  SRC_REF: ${{ inputs.ref || 'main' }}
  # GitHub-hosted runners reach github.com directly — skip the gh-proxy.com mirror (China-only)
  # that third_party/fetch_deps.sh defaults to.
  SCHAT_GH_MIRROR: https://github.com
  SCHAT_RAW_MIRROR: https://raw.githubusercontent.com

jobs:
  # ── macOS: a single Universal2 (arm64 + x86_64) .dmg built on one Apple-Silicon runner.
  # GitHub retired the Intel `macos-13` runner (it queues forever, never picked up), so we no
  # longer build a separate x86_64 leg. Instead: universal STATIC codec/crypto deps built from
  # source (Homebrew is arch-native only) + official universal Qt (aqt via install-qt-action) +
  # CMAKE_OSX_ARCHITECTURES="arm64;x86_64" → one fat .app that runs on both Intel and Apple
  # Silicon. macdeployqt bundles the (universal) Qt frameworks and wraps it in a .dmg. ─────────
  macos:
    name: macOS Qt (Universal2)
    runs-on: macos-14
    timeout-minutes: 120
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"   # Qt 6.8 requires macOS 12+; deps built to match.
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}

      - name: Install build tools (Homebrew)
        run: brew install cmake ninja pkg-config nasm autoconf automake libtool

      - name: Build universal (arm64+x86_64) static deps → /tmp/uni
        shell: bash
        run: |
          set -euo pipefail
          export MACOSX_DEPLOYMENT_TARGET=12.0
          UNI=/tmp/uni; SRC=/tmp/src; J=$(sysctl -n hw.ncpu)
          mkdir -p "$UNI/lib" "$UNI/include" "$SRC"
          DL="${SCHAT_GH_MIRROR:-https://github.com}"

          echo "::group::opus 1.5.2 (CMake, native universal)"
          cd "$SRC"; curl -fsSL https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz -o opus.tgz
          tar xf opus.tgz && cd opus-1.5.2
          cmake -S . -B b -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_INSTALL_PREFIX="$UNI" \
            -DOPUS_BUILD_SHARED_LIBRARY=OFF -DOPUS_BUILD_PROGRAMS=OFF
          cmake --build b -j"$J"; cmake --install b
          echo "::endgroup::"

          echo "::group::openh264 2.4.1 (Makefile per-arch, arch-pinned compiler + lipo)"
          # openh264's darwin Makefile compiles the C/C++ with `-m64` (NOT `-arch x86_64`) for its
          # x86_64 target. On an Intel host `-m64` == x86_64, but on THIS Apple-Silicon runner
          # `-m64` just means "64-bit" → arm64 objects, while the x86 .asm files nasm-assemble as
          # real x86_64 → a mixed archive lipo rejects. Pin CC/CXX to `clang -arch <A>` so an
          # explicit -arch overrides the Makefile's trailing -m64 and every object is one arch.
          cd "$SRC"; curl -fsSL "$DL/cisco/openh264/archive/refs/tags/v2.4.1.tar.gz" -o oh.tgz
          tar xf oh.tgz
          for A in arm64 x86_64; do
            rm -rf "oh-$A"; cp -R openh264-2.4.1 "oh-$A"
            make -C "oh-$A" -j"$J" OS=darwin ARCH="$A" \
              CC="clang -arch $A" CXX="clang++ -arch $A" libraries
            cp "oh-$A/libopenh264.a" "/tmp/oh-$A.a"
            lipo -info "/tmp/oh-$A.a"   # must report a single arch, else the mix is back
          done
          lipo -create /tmp/oh-arm64.a /tmp/oh-x86_64.a -output "$UNI/lib/libopenh264.a"
          mkdir -p "$UNI/include/wels"; cp -f openh264-2.4.1/codec/api/wels/*.h "$UNI/include/wels/"
          echo "::endgroup::"

          echo "::group::libsodium 1.0.20 (configure per-arch in SEPARATE trees + lipo)"
          cd "$SRC"; curl -fsSL https://download.libsodium.org/libsodium/releases/libsodium-1.0.20-stable.tar.gz -o sodium.tgz
          mkdir -p sodium-src && tar -C sodium-src --strip-components=1 -xf sodium.tgz
          for A in arm64 x86_64; do
            H=$([ "$A" = arm64 ] && echo aarch64-apple-darwin || echo x86_64-apple-darwin)
            rm -rf "sodium-$A"; cp -R sodium-src "sodium-$A"
            ( cd "sodium-$A" && ./configure --enable-static --disable-shared --prefix="/tmp/sodium-$A" --host="$H" \
                CC="clang -arch $A" CFLAGS="-arch $A -mmacosx-version-min=12.0 -O2" \
              && make -j"$J" && make install )
          done
          lipo -create /tmp/sodium-arm64/lib/libsodium.a /tmp/sodium-x86_64/lib/libsodium.a -output "$UNI/lib/libsodium.a"
          cp -Rf /tmp/sodium-arm64/include/* "$UNI/include/"
          echo "::endgroup::"

          echo "::group::openssl 3.3.2 (Configure per-arch + lipo — STATIC for libdatachannel DTLS, SHARED for Qt TLS)"
          # Build BOTH static (.a, linked into libdatachannel for DTLS) and shared (.dylib). Qt's
          # openssl TLS backend dlopens libssl/libcrypto at RUNTIME — macdeployqt does NOT bundle
          # OpenSSL, so without the dylibs the backend fails ("Failed to load libssl/libcrypto")
          # and EVERY https/wss call dies at http=0 before login. We bundle the universal dylibs.
          cd "$SRC"; curl -fsSL "$DL/openssl/openssl/releases/download/openssl-3.3.2/openssl-3.3.2.tar.gz" -o ssl.tgz
          tar xf ssl.tgz
          for A in arm64 x86_64; do
            T=$([ "$A" = arm64 ] && echo darwin64-arm64-cc || echo darwin64-x86_64-cc)
            rm -rf "ssl-$A"; cp -R openssl-3.3.2 "ssl-$A"; cd "ssl-$A"
            ./Configure "$T" no-tests no-apps --prefix="/tmp/ssl-$A" -mmacosx-version-min=12.0
            make -j"$J"; make install_sw
            cd "$SRC"
          done
          lipo -create /tmp/ssl-arm64/lib/libssl.a    /tmp/ssl-x86_64/lib/libssl.a    -output "$UNI/lib/libssl.a"
          lipo -create /tmp/ssl-arm64/lib/libcrypto.a /tmp/ssl-x86_64/lib/libcrypto.a -output "$UNI/lib/libcrypto.a"
          # Shared dylibs for Qt: fix each thin dylib's install names FIRST (their build-tree
          # /tmp paths won't exist on a user's Mac), then lipo the fixed thin libs universal.
          # @loader_path for the inter-dylib ref → resolves next to itself (Frameworks/) always.
          for A in arm64 x86_64; do
            install_name_tool -id @rpath/libcrypto.3.dylib /tmp/ssl-$A/lib/libcrypto.3.dylib
            install_name_tool -id @rpath/libssl.3.dylib    /tmp/ssl-$A/lib/libssl.3.dylib
            install_name_tool -change /tmp/ssl-$A/lib/libcrypto.3.dylib @loader_path/libcrypto.3.dylib /tmp/ssl-$A/lib/libssl.3.dylib
          done
          lipo -create /tmp/ssl-arm64/lib/libcrypto.3.dylib /tmp/ssl-x86_64/lib/libcrypto.3.dylib -output "$UNI/lib/libcrypto.3.dylib"
          lipo -create /tmp/ssl-arm64/lib/libssl.3.dylib    /tmp/ssl-x86_64/lib/libssl.3.dylib    -output "$UNI/lib/libssl.3.dylib"
          cp -Rf /tmp/ssl-arm64/include/* "$UNI/include/"
          mkdir -p "$UNI/lib/pkgconfig"; cp -f /tmp/ssl-arm64/lib/pkgconfig/*.pc "$UNI/lib/pkgconfig/" 2>/dev/null || true
          echo "::endgroup::"

          echo "=== universal dep archives (must all list arm64 + x86_64) ==="
          for f in libopus libopenh264 libsodium libssl libcrypto; do lipo -info "$UNI/lib/$f.a"; done

      - name: Install universal Qt6 (official, via aqt)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: mac
          target: desktop
          arch: clang_64
          # qt5compat = the Qt6 port of Qt5's GraphicalEffects (Main.qml imports
          # Qt5Compat.GraphicalEffects for the blur effects). It's a RUNTIME QML module — the
          # build/link never needs it, so omitting it built green but the app died on launch with
          # `module "Qt5Compat.GraphicalEffects" is not installed`. qtshadertools is required too:
          # the GraphicalEffects *private* plugin links QtShaderTools.framework, so without it the
          # app dies one step later on `Cannot load ...graphicaleffectsprivateplugin: QtShaderTools
          # not loaded`. macdeployqt bundles both once aqt installs them.
          modules: "qtmultimedia qtwebsockets qtimageformats qt5compat qtshadertools"

      - name: Fetch third-party deps (libdatachannel source + single headers)
        working-directory: desktop/desktop-qt
        run: bash third_party/fetch_deps.sh

      - name: Configure + build (Universal2 Release)
        working-directory: desktop/desktop-qt
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DSCHAT_MAC_DEP_PREFIX=/tmp/uni \
            -DOPENSSL_ROOT_DIR=/tmp/uni -DOPENSSL_USE_STATIC_LIBS=TRUE
          cmake --build build -j"$(sysctl -n hw.ncpu)"

      # Import the Developer ID cert into a throwaway keychain (only if the secret is set —
      # otherwise the package step falls back to ad-hoc signing so forks still build).
      - name: Import Developer ID signing cert
        id: signcert
        shell: bash
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PW }}
        run: |
          set -euo pipefail
          if [ -z "${CERT_P12:-}" ]; then
            echo "MACOS_CERT_P12 not set — ad-hoc signing"; echo "identity=-" >> "$GITHUB_OUTPUT"; exit 0
          fi
          KC="$RUNNER_TEMP/sign.keychain-db"; KPW="$(openssl rand -base64 18)"
          security create-keychain -p "$KPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KPW" "$KC"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "${CERT_PW:-}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPW" "$KC" >/dev/null
          # Make the temp keychain searchable alongside the defaults so codesign finds the identity.
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          IDENTITY=$(security find-identity -v -p codesigning "$KC" | grep -m1 "Developer ID Application" | sed -E 's/.*"(.*)".*/\1/')
          rm -f "$RUNNER_TEMP/cert.p12"
          [ -n "$IDENTITY" ] || { echo "no Developer ID identity in the imported cert"; exit 1; }
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "imported identity: $IDENTITY"

      - name: Package .dmg (macdeployqt -dmg)
        shell: bash
        working-directory: desktop/desktop-qt
        env:
          SIGN_IDENTITY: ${{ steps.signcert.outputs.identity }}
          NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          set -euo pipefail
          VER=$(grep -E 'kVersion = "[^"]+"' core/include/schat/Version.h | sed -E 's/.*"([^"]+)".*/\1/')
          APP="build/app-qt/secretchat-qt.app"
          echo "=== app binary archs (must be arm64 + x86_64) ==="
          lipo -info "$APP/Contents/MacOS/secretchat-qt" || true
          # Deploy Qt frameworks/plugins/QML FIRST (this rewrites Mach-O install names via
          # install_name_tool). NOTE: no -dmg here on purpose.
          "$QT_ROOT_DIR/bin/macdeployqt" "$APP" -qmldir=app-qt/qml
          # Bundle the universal OpenSSL dylibs so Qt's openssl TLS backend can dlopen them at
          # runtime (macdeployqt doesn't bundle OpenSSL; without these every https/wss dies at
          # http=0). Frameworks/ is on the backend's dlopen search path; install names were
          # already fixed to @rpath / @loader_path in the deps step.
          cp /tmp/uni/lib/libssl.3.dylib /tmp/uni/lib/libcrypto.3.dylib "$APP/Contents/Frameworks/"
          lipo -info "$APP/Contents/Frameworks/libssl.3.dylib" "$APP/Contents/Frameworks/libcrypto.3.dylib"
          # Product name = SChat: rename the bundle (Finder/Dock show "SChat"). The inner binary
          # stays secretchat-qt; CFBundleName is "SChat" (set in CMake). Rename BEFORE signing so the
          # final-named bundle is what gets signed/notarized.
          mv "$APP" "$(dirname "$APP")/SChat.app"; APP="$(dirname "$APP")/SChat.app"
          # Sign AFTER macdeployqt. Signing BEFORE it (the old order) leaves an invalid signature —
          # install_name_tool's rewrites break the seal — and Apple Silicon SIGKILLs the app on
          # launch with "Code Signature Invalid".
          # INSIDE-OUT signing (not `--deep`): --deep skips the QML plugin dylibs macdeployqt puts
          # under Contents/Resources/qml — hardened-runtime library validation then kills the app
          # the moment such a plugin loads ("打开就闪退" with a valid-looking outer signature).
          # Sign every nested Mach-O first, then the outer bundle.
          sign_nested() {   # "$@" = codesign flags (identity etc.) — signs all nested Mach-Os
            find "$APP/Contents/Frameworks" "$APP/Contents/PlugIns" "$APP/Contents/Resources" \
                 \( -name '*.dylib' -o -name '*.so' \) -type f 2>/dev/null | while read -r f; do
              codesign --force "$@" "$f"
            done
            find "$APP/Contents/Frameworks" -maxdepth 1 -name '*.framework' -type d 2>/dev/null | while read -r f; do
              codesign --force "$@" "$f"
            done
          }
          if [ -n "${SIGN_IDENTITY:-}" ] && [ "$SIGN_IDENTITY" != "-" ]; then
            # Real Developer ID + hardened runtime + secure timestamp (required for notarization).
            # Entitlements (source repo desktop/desktop-qt/app-qt/schat.entitlements): QML JIT +
            # camera/mic device access — WITHOUT the device entitlements the hardened-runtime app
            # is killed when 扫一扫/通话/语音 opens the camera or microphone.
            [ -f app-qt/schat.entitlements ] || { echo "ERROR: app-qt/schat.entitlements missing (source checkout too old?) — a hardened-runtime build without the device entitlements crashes on camera/mic use"; exit 1; }
            sign_nested --options runtime --timestamp --sign "$SIGN_IDENTITY"
            codesign --force --options runtime --timestamp \
              --entitlements app-qt/schat.entitlements --sign "$SIGN_IDENTITY" "$APP"
            echo "signed with: $SIGN_IDENTITY"
          else
            sign_nested --sign -       # ad-hoc fallback (no cert secret)
            codesign --force --sign - "$APP"
          fi
          # Strict deep verify — the old shallow `codesign -v` reported OK even when a nested
          # dylib was left unsigned/broken (the exact failure users see as a launch crash).
          codesign --verify --deep --strict --verbose=2 "$APP" && echo "codesign verify OK"
          # Build the .dmg from the SIGNED bundle. Do NOT use `macdeployqt -dmg` here — it would
          # re-deploy (install_name_tool again) and re-break the signature. hdiutil just packs it.
          mkdir -p out
          DMG="out/SChat-macos-${VER}-universal.dmg"
          # hdiutil create can transiently fail with "Resource busy" on CI (Spotlight indexing the
          # srcfolder / a lingering mount). Detach any stale volume and retry a few times.
          for attempt in 1 2 3 4; do
            hdiutil detach "/Volumes/SChat" -force >/dev/null 2>&1 || true
            if hdiutil create -volname "SChat" -srcfolder "$APP" -ov -format UDZO "$DMG"; then
              break
            fi
            echo "hdiutil create failed (attempt $attempt/4) — retrying in 8s"; sleep 8
          done
          [ -f "$DMG" ] || { echo "ERROR: dmg was not created"; exit 1; }
          # Notarize + staple the signed dmg (only with a real signature + notary creds; Apple
          # rejects ad-hoc submissions). Uses an App Store Connect API key (.p8).
          if [ -n "${SIGN_IDENTITY:-}" ] && [ "$SIGN_IDENTITY" != "-" ] && [ -n "${NOTARY_KEY:-}" ]; then
            # REQUIRED (policy: a release must NEVER contain an un-notarized dmg). If notarytool
            # times out / Apple rejects, this step FAILS → the artifact upload is skipped → no macOS
            # dmg in the release (rather than an un-notarized one). During an Apple notary outage
            # this leg fails until Apple recovers — re-run then.
            echo "$NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/nkey.p8"
            xcrun notarytool submit "$DMG" \
              --key "$RUNNER_TEMP/nkey.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER" \
              --wait --timeout 45m
            xcrun stapler staple "$DMG"
            xcrun stapler validate "$DMG" && echo "notarized + stapled OK"
            rm -f "$RUNNER_TEMP/nkey.p8"
          else
            echo "notary creds not set (or ad-hoc signature) — skipping notarization (fork build)"
          fi
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: qt-macos-universal
          path: desktop/desktop-qt/out/*

  # ── Windows: x64 via MSYS2/MINGW64. pacman provides gcc + Qt6 + OpenSSL + opus/libsodium/
  # openh264/libsrtp (all with pkg-config), so libdatachannel's DTLS finds OpenSSL and the core
  # links the codecs via pkg-config (the CMake MSYS2 branch). windeployqt bundles the Qt DLLs;
  # NSIS builds a self-contained installer .exe. ──────────────────────────────────────────────
  windows:
    name: Windows Qt (x64, MSYS2 → installer)
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git curl
            mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf mingw-w64-x86_64-qt6-base mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-multimedia mingw-w64-x86_64-qt6-websockets mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-5compat mingw-w64-x86_64-qt6-shadertools
            mingw-w64-x86_64-opus mingw-w64-x86_64-libsodium mingw-w64-x86_64-openh264
            mingw-w64-x86_64-openssl mingw-w64-x86_64-libsrtp mingw-w64-x86_64-nsis

      - name: Fetch third-party deps (libdatachannel source + single headers)
        working-directory: desktop/desktop-qt
        run: bash third_party/fetch_deps.sh

      - name: Configure + build (Release)
        working-directory: desktop/desktop-qt
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(nproc)"

      - name: Package installer (windeployqt + NSIS)
        working-directory: desktop/desktop-qt
        run: |
          set -e
          VER=$(grep -E 'kVersion = "[^"]+"' core/include/schat/Version.h | sed -E 's/.*"([^"]+)".*/\1/')
          STAGE="pkg/SChat"
          mkdir -p "$STAGE" out
          cp build/app-qt/secretchat-qt.exe "$STAGE/"
          QTBIN="$(qmake6 -query QT_INSTALL_BINS)"; QMLSRC="$(qmake6 -query QT_INSTALL_QML)"
          export PATH="$QTBIN:$PATH"
          echo "QTBIN=$QTBIN"; ls "$QTBIN"/qmlimportscanner* "$QTBIN"/windeployqt* 2>&1 | head || true
          # windeployqt's --qmldir scan (qmlimportscanner) is flaky on MSYS2; fall back to a
          # manual QML deploy if it fails so the installer is still complete + self-contained.
          if ! windeployqt --qmldir "$PWD/app-qt/qml" --release --no-translations "$STAGE/secretchat-qt.exe"; then
            echo "windeployqt --qmldir failed → deploy core DLLs + copy QML modules manually"
            windeployqt --release --no-translations "$STAGE/secretchat-qt.exe" || true
            mkdir -p "$STAGE/qml"
            # Top-level module dirs are copied recursively, so their submodules (QtQuick/Controls,
            # Qt5Compat/GraphicalEffects, …) come along. Qt5Compat = the blur effects Main.qml imports.
            for m in Qt QtCore QtQml QtQuick QtMultimedia Qt5Compat; do
              [ -d "$QMLSRC/$m" ] && cp -r "$QMLSRC/$m" "$STAGE/qml/" || true
            done
            # Qt6ShaderTools = linked by the Qt5Compat GraphicalEffects private plugin; without it
            # the app dies on launch with "Cannot load ...graphicaleffectsprivateplugin".
            for d in Qt6QuickControls2 Qt6QuickControls2Impl Qt6QuickControls2Basic \
                     Qt6QuickTemplates2 Qt6QuickLayouts Qt6QuickDialogs2 Qt6QuickDialogs2QuickImpl \
                     Qt6QuickDialogs2Utils Qt6QmlModels Qt6QuickShapes Qt6LabsQmlModels \
                     Qt6QuickEffects Qt6QmlWorkerScript Qt6ShaderTools; do
              [ -f "$QTBIN/$d.dll" ] && cp "$QTBIN/$d.dll" "$STAGE/" || true
            done
            printf '[Paths]\nPrefix = .\n' > "$STAGE/qt.conf"
          fi
          # Qt's openssl TLS backend needs the actual OpenSSL DLLs at runtime — windeployqt bundles
          # the backend plugin (tls/qopensslbackend.dll) but NOT libssl/libcrypto themselves, so
          # without these every https/wss dies before login (same class of bug as macOS). Copy the
          # MSYS2 openssl-3 DLLs into the install dir next to the exe.
          for d in libssl-3-x64 libcrypto-3-x64 libssl-3 libcrypto-3; do
            [ -f "/mingw64/bin/$d.dll" ] && cp "/mingw64/bin/$d.dll" "$STAGE/" || true
          done
          ls "$STAGE"/libssl* "$STAGE"/libcrypto* 2>/dev/null || echo "WARN: no openssl DLLs staged"
          # 语音转文字引擎运行库(sherpa-onnx C API + onnxruntime,官方 MSVC 预编译,MT=静态
          # CRT):AsrEngine 运行时 LoadLibrary exe 旁的 sherpa-onnx-c-api.dll;缺失仅「转文字」
          # 不可用(SenseVoice 模型本体 ~163MB 由应用首次使用时下载,不进安装包)。
          SHERPA_VER=1.13.4
          curl -fsSL "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${SHERPA_VER}/sherpa-onnx-v${SHERPA_VER}-win-x64-shared-MT-Release-no-tts-lib.tar.bz2" -o /tmp/sherpa.tar.bz2
          mkdir -p /tmp/sherpa && tar -xf /tmp/sherpa.tar.bz2 -C /tmp/sherpa --strip-components=1
          cp /tmp/sherpa/lib/*.dll "$STAGE/"
          ls "$STAGE"/sherpa-onnx-c-api.dll "$STAGE"/onnxruntime.dll
          # ── Full runtime DLL closure (THE fix for the "downloaded package instant-exits" bug) ──
          # windeployqt bundles Qt6*.dll + the plugin/QML DLLs, but NOT the ~30 non-Qt runtime DLLs
          # they pull in: the MinGW runtime (libgcc_s_seh-1/libstdc++-6/libwinpthread-1), ICU
          # (libicu*78), Qt's transitive deps (harfbuzz/freetype/pcre2/glib/brotli/zlib/png/md4c/…),
          # the codecs (libopus-0/libopenh264-7/libsodium-26), AND — invisible to a static ldd on
          # the exe because they're LoadLibrary'd — the plugin DLLs' OWN deps (sqldrivers/qsqlite →
          # libsqlite3-0, imageformats/qjpeg → libjpeg-8, the glib-linked plugins → libgio/gobject/
          # gmodule/ffi). Missing ANY of them makes the packaged app exit immediately with empty
          # stderr on a clean (non-dev) machine — the whole reason a CI-built installer that
          # "packaged fine" never actually launched. Walk ldd over EVERY dll/exe already staged
          # (recursively, so plugin subdirs count) and copy every /mingw64 dependency next to the
          # exe (the exe dir is always on the DLL search path); repeat until a pass adds nothing.
          echo "=== resolving full DLL closure ==="
          while :; do
            before=$(find "$STAGE" -maxdepth 1 -iname '*.dll' | wc -l)
            while IFS= read -r bin; do
              ldd "$bin" 2>/dev/null | awk '/=> \/mingw64\// { print $3 }'
            done < <(find "$STAGE" -type f \( -iname '*.dll' -o -iname '*.exe' \)) \
              | sort -u | while IFS= read -r dep; do
                  base=$(basename "$dep")
                  [ -f "$STAGE/$base" ] || cp "$dep" "$STAGE/"
                done
            after=$(find "$STAGE" -maxdepth 1 -iname '*.dll' | wc -l)
            echo "  DLL closure pass: $before -> $after"
            if [ "$before" = "$after" ]; then break; fi
          done
          echo "staged top-level DLLs: $(find "$STAGE" -maxdepth 1 -iname '*.dll' | wc -l) (expect ~90)"
          # Fail loudly if the MinGW runtime trio is still missing — that trio absent == the
          # instant-exit bug is back and the package is DOA; better to fail the build than ship it.
          for must in libgcc_s_seh-1 libstdc++-6 libwinpthread-1 libsqlite3-0; do
            [ -f "$STAGE/$must.dll" ] || { echo "FATAL: $must.dll missing from package"; exit 1; }
          done
          # Minimal NSIS installer: install to Program Files, Start-menu + desktop shortcut, uninstaller.
          cat > installer.nsi <<'NSI'
          !include "MUI2.nsh"
          Name "SChat"
          OutFile "SChat-Setup.exe"
          InstallDir "$PROGRAMFILES64\SChat"
          RequestExecutionLevel admin
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "SimpChinese"
          !insertmacro MUI_LANGUAGE "English"
          Section "Install"
            SetOutPath "$INSTDIR"
            File /r "pkg\SChat\*.*"
            CreateShortcut "$SMPROGRAMS\SChat.lnk" "$INSTDIR\secretchat-qt.exe"
            CreateShortcut "$DESKTOP\SChat.lnk" "$INSTDIR\secretchat-qt.exe"
            WriteUninstaller "$INSTDIR\uninstall.exe"
          SectionEnd
          Section "Uninstall"
            Delete "$SMPROGRAMS\SChat.lnk"
            Delete "$DESKTOP\SChat.lnk"
            RMDir /r "$INSTDIR"
          SectionEnd
          NSI
          makensis installer.nsi
          mv SChat-Setup.exe "out/SChat-windows-${VER}-x64-setup.exe"
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: qt-windows-x64
          path: desktop/desktop-qt/out/*

  # ── Linux: x86_64 + aarch64, built + packaged in Debian trixie containers (trixie ships
  # Qt 6.8 + libsodium ≥1.0.19 + codecs). Produces a .deb (both arches) and, on x86_64, a
  # self-contained AppImage — via scripts/ci-linux-pkg.sh in the source repo. Both arches run
  # natively on matching runners. (armhf/QEMU dropped 2026-07-15 — 每次多拖 ~1h 且无真实用户。)
  linux:
    name: Linux Qt (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    arch: x86_64,  image: "debian:trixie",         platform: linux/amd64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64, image: "arm64v8/debian:trixie", platform: linux/arm64 }
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}

      - name: Build + package (.deb + AppImage) in Debian trixie (${{ matrix.arch }})
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -e SCHAT_GH_MIRROR -e SCHAT_RAW_MIRROR -e ARCH=${{ matrix.arch }} \
            -v "$PWD:/src" -w /src/desktop/desktop-qt \
            ${{ matrix.image }} bash scripts/ci-linux-pkg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: qt-linux-${{ matrix.arch }}
          path: desktop/desktop-qt/out/*

  # NOTE: no release job here on purpose — the three build jobs above only upload artifacts.
  # build.yml ("Build All") calls this workflow and its own release job bundles the Qt desktop
  # artifacts into the single combined release. A standalone workflow_dispatch just produces the
  # artifacts (downloadable from the run) for desktop-only test builds.
