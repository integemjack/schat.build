name: macOS amd64 Trial

# 【试验性 / 不发 release / 不进 Build All】
# 目的:验证 desktop/macos(SwiftUI 线)能否产出 **x86_64** 的 .app。
# 现状是 arm64-only,卡点写在 qt-desktop.yml 头部:「Package.swift 的通话链接钉 arch-native
# brew dylib 路径」——本工作流就是来试这条路通不通的。成功后再谈要不要转 universal。
#
# ── 为什么不用 Rosetta + Intel Homebrew ────────────────────────────────────────────────
# 全程**只交叉链接、从不运行** x86_64 二进制,所以不需要 Rosetta:直接从 ghcr 拉 Intel
# bottle 的 blob(bottle 就是个 tar.gz),在 /usr/local 下还原出一套与真实 brew 安装
# **逐字节同构**的布局(真 Cellar + opt/ 软链 + 替换掉 install_name 占位符),下游
# Package.swift 的链接路径、package-app.sh 的 `cp -f "$dep"`、以及那条「不再引用任何
# brew 路径」的收敛断言就都能零改动地工作。bottle tag `sonoma` = x86_64/macOS 14,
# 与 Info.plist 的 LSMinimumSystemVersion 14.0 对齐。细节与两个坑见下面步骤里的注释。
#
# ── 对源码仓库的改动:零 ────────────────────────────────────────────────────────────────
# 四处在 runner 上就地 patch(一次性,不回流源仓),每处都带断言,源码结构一变就当场失败,
# 而不是静默产出 arm64 / 缺依赖 / 无通话功能的包:
#   A. Package.swift  : brewOpt 的 `/opt/homebrew/opt` 优先探测 → 钉死 `/usr/local/opt`
#                       (runner 上 /opt/homebrew 必然存在,不钉死就永远选到 arm64 dylib)
#   B. core/CMakeLists: APPLE 分支用 `brew --prefix opus` 拿路径 → PATH 里插一个 brew shim
#                       把 --prefix 重定向到 /usr/local/opt(比 sed 六行更稳)
#   C. package-app.sh : swift build 加 --arch x86_64;.build/release → 交叉编译的 bin 路径;
#                       产物名 -arm64 → -x86_64
#   D. package-app.sh : brew 路径模式 `/usr/local/opt/` 放宽到 `/usr/local/` —— 这条是绕过
#                       一个**既有缺陷**(不是本 CI 特有),详见该步注释,试验通过后应回源仓修
#
# ── 判定标准 ──────────────────────────────────────────────────────────────────────────
# 每一层都 `lipo -info` 断言是 x86_64(核心 .a / 可执行文件 / 内嵌 dylib)。CI 绿 ≠ 能跑:
# 本工作流只证明「编得出、链得上、arch 对」,真机启动/通话/TLS 仍需 Intel Mac 实测
# (qt 线的教训:构建期全绿、装上秒崩的坑一次踩了四个)。
#
# 签名:只有 package-app.sh 的 ad-hoc 签名,不导入 Developer ID、不公证 —— 试验产物不分发。

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ireoo/Secret-Chat 的分支或标签"
        required: false
        default: "main"
      bottle_tag:
        description: "Intel bottle 的 macOS 代号(x86_64):sonoma=14 / sequoia=15"
        required: false
        default: "sonoma"

permissions:
  contents: read

concurrency:
  group: macos-amd64-trial-${{ github.ref }}
  cancel-in-progress: true

env:
  SRC_REPO: Ireoo/Secret-Chat
  SRC_REF: ${{ inputs.ref || 'main' }}
  BOTTLE_TAG: ${{ inputs.bottle_tag || 'sonoma' }}
  # GitHub runner 直连 github.com — 跳过 fetch_deps.sh 默认的 gh-proxy 国内镜像。
  SCHAT_GH_MIRROR: https://github.com
  SCHAT_RAW_MIRROR: https://raw.githubusercontent.com
  # Intel bottle 解包落点(软链源)。
  INTEL_STAGE: /tmp/intel-deps

jobs:
  macos-amd64:
    name: macOS SwiftUI (x86_64 trial)
    # 与 qt-desktop.yml 的 mac 腿同镜像:macos-26/Xcode 26 = 本地开发同代工具链。
    # 注意这是 **arm64 runner**,我们在其上交叉编译 x86_64(GitHub 已退役 Intel runner)。
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}

      - name: Select Xcode 26 (match local toolchain)
        shell: bash
        run: |
          set -euo pipefail
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          xcodebuild -version
          swift --version
          echo "host arch: $(uname -m)   (期望 arm64 —— 我们在 arm64 上交叉编 x86_64)"

      - name: Install host build tools
        run: brew install cmake ninja pkg-config

      # ── 1. 取 Intel(x86_64)bottle,还原成一套真实的 /usr/local Homebrew 布局 ──────
      #
      # ⚠️ 不走 `brew fetch --bottle-tag=` —— 实测(run 29742862534)它在 bottle 取不到时
      # **仍返回 exit 0**,只打一条 warning「Bottle for tag :sonoma is unavailable」,导致
      # 「先判成功、再拿到空路径」。改为直接读 formulae.brew.sh 的 JSON 拿 ghcr blob URL
      # (匿名拉取的固定令牌 `Bearer QQ==`,Homebrew 自己也是这么干的)+ sha256 校验。
      #
      # ⚠️ bottle 里的 install_name 是**占位符**,不是真实路径:
      #     id  : @@HOMEBREW_PREFIX@@/opt/opus/lib/libopus.0.dylib
      #     dep : @@HOMEBREW_CELLAR@@/openssl@3/3.6.3/lib/libcrypto.3.dylib
      # (bottle 是可重定位的,由 `brew install` 在安装时替换)。不还原的话链接器会把
      # `@@HOMEBREW_PREFIX@@/...` 记进 load command,而 package-app.sh 的重写器与那条
      # 收敛断言都只认 /opt/homebrew|/usr/local 开头 —— 匹配不到 ⇒ 不重写 ⇒ 断言照样绿 ⇒
      # 产出一个装上必然 dyld 失败的包。所以这里照 brew 的口径逐字替换:
      #     @@HOMEBREW_PREFIX@@ → /usr/local        @@HOMEBREW_CELLAR@@ → /usr/local/Cellar
      # 并解到真 Cellar + 软链 opt/,与 Intel Mac 上真实 brew 安装的形态逐字节同构。
      - name: Fetch x86_64 bottles → 还原 /usr/local Homebrew 布局
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /usr/local/Cellar /usr/local/opt
          sudo chown -R "$(id -u)":"$(id -g)" /usr/local/Cellar /usr/local/opt
          mkdir -p "$INTEL_STAGE"
          # 依赖清单 = Package.swift callLinkFlags 里那五个 dylib 的来源(openssl@3 出两个)。
          for f in opus openh264 libsodium openssl@3; do
            echo "▸ $f (bottle-tag=$BOTTLE_TAG) …"
            API="https://formulae.brew.sh/api/formula/${f/@/%40}.json"
            read -r URL SHA < <(curl -fsSL "$API" | python3 -c "
          import json,sys,os
          d=json.load(sys.stdin)
          files=d['bottle']['stable']['files']
          tag=os.environ['BOTTLE_TAG']
          if tag not in files:
              sys.exit(f'✗ 该 formula 没有 {tag} 的 x86_64 bottle;可用 tag: {sorted(files)}')
          print(files[tag]['url'], files[tag]['sha256'])
          ")
            [ -n "$URL" ] || { echo "✗ $f 取不到 bottle URL" >&2; exit 1; }
            TB="$INTEL_STAGE/$f.tar.gz"
            curl -fsSL -H "Authorization: Bearer QQ==" -o "$TB" "$URL"
            echo "$SHA  $TB" | shasum -a 256 -c - || { echo "✗ $f bottle sha256 不匹配" >&2; exit 1; }
            # tarball 根就是 <formula>/<version>/… —— 直接解进 Cellar 即为真实布局。
            tar -xzf "$TB" -C /usr/local/Cellar
            V=$(find "/usr/local/Cellar/$f" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)
            [ -n "$V" ] || { echo "✗ $f 解包后找不到版本目录" >&2; exit 1; }
            ln -sfn "$V" "/usr/local/opt/$f"
            echo "  → /usr/local/opt/$f -> $V"
          done

          echo "=== 还原 install_name 占位符(照 brew install 的口径)==="
          # ⚠️ 本步是 `set -euo pipefail`:任何 `… | grep X | …` 在**无匹配**时 grep 退出 1,
          # pipefail 让整条管道失败、set -e 当场杀步 —— 而「没有 @@ 依赖」是完全正常的情况
          # (libopus 就只依赖 libSystem)。所以凡是可能空匹配的 grep 一律先落到变量并 `|| true`,
          # 绝不直接接管道。(run 29743226728 就是死在这里,一个字符没输出。)
          find /usr/local/Cellar -name '*.dylib' -type f | while read -r d; do
            ID=$(otool -D "$d" | tail -1)
            N=${ID//@@HOMEBREW_PREFIX@@//usr/local}; N=${N//@@HOMEBREW_CELLAR@@//usr/local/Cellar}
            [ "$N" = "$ID" ] || install_name_tool -id "$N" "$d" 2>/dev/null || true
            DEPS=$(otool -L "$d" | tail -n +2 | awk '{print $1}' | grep '@@HOMEBREW' || true)
            for dep in $DEPS; do
              ND=${dep//@@HOMEBREW_PREFIX@@//usr/local}; ND=${ND//@@HOMEBREW_CELLAR@@//usr/local/Cellar}
              install_name_tool -change "$dep" "$ND" "$d" 2>/dev/null || true
            done
            # install_name_tool 会让原签名失效 —— 重新 ad-hoc 签,免得后续工具链挑刺。
            codesign -f -s - "$d" >/dev/null 2>&1 || true
          done
          echo "  ✓ 重定位完成($(find /usr/local/Cellar -name '*.dylib' -type f | wc -l | tr -d ' ') 个 dylib)"

          echo "=== 断言:x86_64 + 无残留占位符 + 依赖可解析 ==="
          FAIL=0
          if find /usr/local/Cellar -name '*.dylib' -type f -exec otool -L {} \; | grep -q '@@HOMEBREW'; then
            echo "  ✗ 仍有未还原的 @@HOMEBREW_*@@ 占位符"; FAIL=1
          else
            echo "  ✓ 无残留占位符"
          fi
          for d in /usr/local/opt/opus/lib/libopus.dylib \
                   /usr/local/opt/openh264/lib/libopenh264.dylib \
                   /usr/local/opt/libsodium/lib/libsodium.dylib \
                   /usr/local/opt/openssl@3/lib/libssl.dylib \
                   /usr/local/opt/openssl@3/lib/libcrypto.dylib; do
            if [ ! -f "$d" ]; then echo "  ✗ 缺失 $d"; FAIL=1; continue; fi
            INFO=$(lipo -info "$d")
            echo "  $INFO"
            case "$INFO" in *x86_64*) ;; *) echo "    ✗ 不是 x86_64!"; FAIL=1;; esac
            # 每个非系统依赖都必须能在磁盘上解析到 —— 这是「装上能不能起来」的最早关口。
            # (同样先落变量 + || true:全被过滤光时 grep -v 退出 1 会被 pipefail 放大成杀步。)
            REFS=$(otool -L "$d" | tail -n +2 | awk '{print $1}' | grep -v '^/usr/lib/' | grep -v '^/System/' || true)
            for p in $REFS; do
              [ -f "$p" ] || { echo "    ✗ 依赖解析不到: $p"; FAIL=1; }
            done
          done
          [ "$FAIL" = 0 ] || { echo "x86_64 依赖准备失败" >&2; exit 1; }

      # ── 2. 就地 patch 三处 arch 硬编码(带断言,匹配不到就失败)────────────────────
      - name: Patch A — Package.swift 钉死 /usr/local/opt
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re, pathlib, sys
          p = pathlib.Path("desktop/macos/Package.swift")
          s = p.read_text()
          pat = (r'let brewOpt = FileManager\.default\.fileExists\(atPath: "/opt/homebrew/opt"\)'
                 r' \? "/opt/homebrew/opt"\s*\n\s*: "/usr/local/opt"')
          s2, n = re.subn(pat, 'let brewOpt = "/usr/local/opt"  // CI amd64 trial: 钉死 Intel bottle 前缀', s)
          if n != 1:
              sys.exit(f"✗ brewOpt 未匹配到(源码结构变了?)matches={n} —— 请更新本 patch")
          p.write_text(s2)
          print("✓ Package.swift patched")
          PY
          grep -n 'brewOpt' desktop/macos/Package.swift || true

      - name: Patch B — brew shim(把 --prefix 重定向到 /usr/local/opt)
        shell: bash
        run: |
          set -euo pipefail
          # core/CMakeLists.txt 的 APPLE 分支用 `brew --prefix opus|openh264|libsodium` 定位依赖,
          # 顶层 CMakeLists 用 `brew --prefix openssl@3`。在 arm64 runner 上真 brew 一律返回
          # /opt/homebrew/opt(arm64!)—— 会把 arm64 dylib 链进 x86_64 目标。插一层 shim 拦掉。
          mkdir -p /tmp/brewshim
          cat > /tmp/brewshim/brew <<'SH'
          #!/usr/bin/env bash
          # amd64 trial shim:仅拦 `brew --prefix <formula>`,其余原样转发给真 brew。
          if [ "${1:-}" = "--prefix" ] && [ -n "${2:-}" ]; then
            echo "/usr/local/opt/$2"; exit 0
          fi
          exec /opt/homebrew/bin/brew "$@"
          SH
          chmod +x /tmp/brewshim/brew
          echo "/tmp/brewshim" >> "$GITHUB_PATH"
          echo "shim self-test: $(/tmp/brewshim/brew --prefix opus)"

      # ── 3. 构建 ────────────────────────────────────────────────────────────────────
      - name: Fetch third-party deps (libdatachannel source + single headers)
        working-directory: desktop/desktop-qt
        run: bash third_party/fetch_deps.sh

      - name: Build call core as x86_64 (schat_core + libdatachannel)
        shell: bash
        run: |
          set -euo pipefail
          # build-core.sh 的 cmake 配置行不带 arch —— 注入交叉编译三件套。
          grep -q '\-DSCHAT_BUILD_APP=OFF' desktop/macos/scripts/build-core.sh || {
            echo "✗ build-core.sh 结构变了,找不到 -DSCHAT_BUILD_APP=OFF"; exit 1; }
          sed -i '' 's|-DSCHAT_BUILD_APP=OFF|-DSCHAT_BUILD_APP=OFF -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 -DOPENSSL_ROOT_DIR=/usr/local/opt/openssl@3|' \
            desktop/macos/scripts/build-core.sh
          grep -n 'cmake -S' desktop/macos/scripts/build-core.sh || true
          bash desktop/macos/scripts/build-core.sh

      - name: Verify core libs are x86_64
        shell: bash
        run: |
          set -euo pipefail
          B=desktop/desktop-qt/build
          FAIL=0
          for f in core/libschat_core.a \
                   third_party/libdatachannel/libdatachannel-static.a \
                   third_party/libdatachannel/deps/usrsctp/usrsctplib/libusrsctp.a \
                   third_party/libdatachannel/deps/libsrtp/libsrtp2.a \
                   third_party/libdatachannel/deps/libjuice/libjuice-static.a; do
            INFO=$(lipo -info "$B/$f" 2>&1 || echo "MISSING")
            echo "  $f: $INFO"
            case "$INFO" in *x86_64*) ;; *) echo "    ✗ 不是 x86_64!"; FAIL=1;; esac
          done
          [ "$FAIL" = 0 ] || { echo "核心库架构不对 —— 交叉编译没生效" >&2; exit 1; }

      # ⚠️ Patch C 必须排在核心库构建**之后**:Package.swift 的 `callsAvailable` 是靠探测
      # libschat_core.a 是否存在来决定链不链通话的,而 SwiftPM 会**缓存 manifest 的求值结果**
      # (缓存键只看 manifest 内容 + 工具链,不看它查过的文件系统)。核心库还没编出来就先跑一次
      # swift(哪怕只是 --show-bin-path),会把 callsAvailable=false 的结果焊进缓存,之后真正
      # 构建时直接复用 → 静默产出一个**没有通话功能**的包。故:先编核心,再问路径,再打包;
      # 并且一律带 --manifest-cache none 双保险。
      - name: Patch C — package-app.sh 交叉编译 + 产物改名
        shell: bash
        working-directory: desktop/macos
        run: |
          set -euo pipefail
          # 交叉编译时 SwiftPM 的产物落在 .build/<triple>/release,不是 .build/release。
          # 不硬编 triple —— 直接问 SwiftPM 要(源码/工具链一变也不会错)。
          BINPATH=$(swift build -c release --arch x86_64 --manifest-cache none --show-bin-path)
          echo "x86_64 bin path: $BINPATH"
          [ -n "$BINPATH" ] || { echo "✗ --show-bin-path 返回空" >&2; exit 1; }
          grep -q 'swift build -c release' scripts/package-app.sh || { echo "✗ 找不到 swift build 行"; exit 1; }
          grep -q '\.build/release' scripts/package-app.sh          || { echo "✗ 找不到 .build/release"; exit 1; }
          grep -q -- '-arm64\.zip' scripts/package-app.sh           || { echo "✗ 找不到 -arm64.zip"; exit 1; }
          sed -i '' 's|swift build -c release$|swift build -c release --arch x86_64 --manifest-cache none|' scripts/package-app.sh
          sed -i '' "s|\.build/release|${BINPATH}|g"                 scripts/package-app.sh
          sed -i '' 's|-arm64\.zip|-x86_64.zip|'                     scripts/package-app.sh
          echo "=== patch 结果 ==="
          grep -n 'swift build\|'"$(basename "$BINPATH")"'\|x86_64\.zip' scripts/package-app.sh || true

      - name: Patch D — package-app.sh 的 brew 路径模式在 /usr/local 下是漏的
        shell: bash
        working-directory: desktop/macos
        run: |
          set -euo pipefail
          # package-app.sh 的 dylib 重写器与收敛断言用的模式是:
          #     /opt/homebrew/  |  /usr/local/opt/
          #        ↑ 宽(连 Cellar 一起吃)     ↑ 窄(吃不到 /usr/local/Cellar/)
          # 而 brew 把库间依赖写成 Cellar 路径(实测本机 arm64:libssl 依赖
          # /opt/homebrew/Cellar/openssl@3/3.6.2/lib/libcrypto.3.dylib)。arm64 一直没事
          # 纯粹是走了宽的那一支;/usr/local 前缀下 libcrypto 会被漏掉 —— 不被拷进
          # Frameworks、不被改 install name,而断言用的是同一个窄模式所以照样绿 ⇒
          # 又一个「CI 全绿、装上 dyld 失败」。这里把窄的那支放宽到 /usr/local/。
          #
          # ⚠️ 这不是本 CI 特有的问题,是 package-app.sh 对**任何 /usr/local 前缀主机**
          # (即所有 Intel Mac 上的本地打包)都存在的既有缺陷 —— 试验通过后应回源码仓库修。
          python3 - <<'PY'
          import pathlib, sys
          p = pathlib.Path("scripts/package-app.sh")
          s = p.read_text()
          awk_old,  awk_new  = r"\/usr\/local\/opt\/", r"\/usr\/local\/"   # awk 正则里的转义形态
          grep_old, grep_new = "/usr/local/opt/",      "/usr/local/"       # grep -E 里的裸形态
          n1, n2 = s.count(awk_old), s.count(grep_old)
          if (n1, n2) != (1, 2):
              sys.exit(f"✗ 模式出现次数不符(期望 awk=1 grep=2,实得 awk={n1} grep={n2}) —— 源码结构变了,请更新本 patch")
          s = s.replace(awk_old, awk_new).replace(grep_old, grep_new)
          p.write_text(s)
          print("✓ package-app.sh 路径模式已放宽")
          PY
          grep -n 'usr/local' scripts/package-app.sh || true

      - name: Build + assemble SChat.app (x86_64)
        shell: bash
        run: bash desktop/macos/scripts/package-app.sh

      # ── 4. 判定 ────────────────────────────────────────────────────────────────────
      - name: Verify .app is x86_64
        shell: bash
        working-directory: desktop/macos
        run: |
          set -euo pipefail
          APP="dist/SChat.app"
          [ -d "$APP" ] || { echo "✗ package-app.sh 没产出 $APP"; exit 1; }
          FAIL=0
          echo "=== 可执行文件 ==="
          INFO=$(lipo -info "$APP/Contents/MacOS/SecretChatMac")
          echo "  $INFO"
          case "$INFO" in *x86_64*) ;; *) echo "  ✗ 不是 x86_64!"; FAIL=1;; esac
          echo "=== 内嵌 dylib ==="
          for f in "$APP/Contents/Frameworks"/*.dylib; do
            [ -e "$f" ] || continue
            INFO=$(lipo -info "$f")
            echo "  $INFO"
            case "$INFO" in *x86_64*) ;; *) echo "  ✗ 不是 x86_64!"; FAIL=1;; esac
          done
          echo "=== 残留 brew 绝对路径(应为空)==="
          otool -L "$APP/Contents/MacOS/SecretChatMac" "$APP/Contents/Frameworks"/*.dylib 2>/dev/null \
            | grep -E "/opt/homebrew/|/usr/local/" || echo "  (无 —— 收敛干净)"
          echo "=== 通话核心是否真的编进去了(SCHAT_CALLS 门控)==="
          # Package.swift 以 libschat_core.a 是否存在决定链不链通话;交叉编译若让核心落到别处,
          # 会**静默**产出一个没有通话功能的包 —— 这里显式验符号。
          # 本机 arm64 包实测基线:`T _schat_call_create`(外部导出),schat_call_* 共 107 个
          # (17 个 T / 75 个 t / 15 个 s)。下面把实际计数全打出来,好判断是「整个核心没链」
          # 还是「只是某个符号被 dead-strip」。
          B="$APP/Contents/MacOS/SecretChatMac"
          NCALL=$(nm "$B" 2>/dev/null | grep -c 'schat_call_'  || true)
          NGRP=$(nm  "$B" 2>/dev/null | grep -c 'schat_group_' || true)
          NEXT=$(nm  "$B" 2>/dev/null | grep 'schat_call_' | awk '$2=="T"' | wc -l | tr -d ' ' || true)
          echo "  schat_call_*  符号数: $NCALL (其中外部 T: $NEXT)"
          echo "  schat_group_* 符号数: $NGRP"
          echo "  ── 抽样 ──"
          nm "$B" 2>/dev/null | grep 'schat_' | head -8 || echo "    (一个都没有)"
          echo "  ── Swift 侧 CallEngine 是否编进来(SCHAT_CALLS 的另一面)──"
          nm "$B" 2>/dev/null | grep -ci 'CallEngine' || echo "    0"
          if [ "${NCALL:-0}" -gt 0 ]; then
            echo "  ✓ 通话核心已链入"
          else
            echo "  ✗ 通话核心完全缺失 —— 包被静默降级成「无通话」版本"; FAIL=1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP" && echo "codesign(ad-hoc) verify OK"
          [ "$FAIL" = 0 ] || exit 1
          ls -la dist

      # always():验证不过时**照样**上传 —— 试验阶段那个包本身就是最好的诊断材料,
      # 而且有 Intel Mac 可以直接拿去实测(CI 的断言只是代理指标,不是最终判据)。
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-swiftui-x86_64-trial
          path: desktop/macos/dist/*.zip
          if-no-files-found: warn

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "本工作流只验证「编得出 / 链得上 / arch 正确」。" >> "$GITHUB_STEP_SUMMARY"
          echo "**未**验证:真机启动、TLS、通话、扫码 —— 这些必须在 Intel Mac 上实测" >> "$GITHUB_STEP_SUMMARY"
          echo "(qt 线有过「CI 全绿、装上秒崩」的四连坑先例)。" >> "$GITHUB_STEP_SUMMARY"
