name: Native Desktop

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ireoo/Secret-Chat 的分支或标签（原生桌面端在 v9.9）"
        required: false
        default: "v9.9"

# dispatch-only：原生桌面端的编译/测试验证按需触发（需源仓已 push 对应 ref）。
permissions:
  contents: write

env:
  SRC_REPO: Ireoo/Secret-Chat
  SRC_REF: ${{ github.event.inputs.ref || 'v9.9' }}

jobs:
  # macOS: a single universal (arm64 + x86_64) .app — one artifact runs on both
  # Apple Silicon and Intel Macs.
  macos:
    name: macOS SwiftUI (universal .app)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}

      - name: Build universal release binary
        working-directory: desktop-native/macos
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Run E2E golden-vector tests
        working-directory: desktop-native/macos
        run: swift test

      - name: Package universal .app
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -E 'marketingVersion = "[^"]+"' desktop-native/macos/Sources/SecretChatMac/Models/ChatModels.swift | sed -E 's/.*"([^"]+)".*/\1/')
          BUILD=$(grep -E 'buildNumber = [0-9]+' desktop-native/macos/Sources/SecretChatMac/Models/ChatModels.swift | sed -E 's/.*= ([0-9]+).*/\1/')
          BIN=desktop-native/macos/.build/apple/Products/Release/SecretChatMac
          lipo -archs "$BIN"
          APP="out/Secret Chat Native.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/SecretChatMac"
          chmod +x "$APP/Contents/MacOS/SecretChatMac"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key><string>zh_CN</string>
            <key>CFBundleDisplayName</key><string>Secret Chat Native</string>
            <key>CFBundleExecutable</key><string>SecretChatMac</string>
            <key>CFBundleIdentifier</key><string>com.secretchat.native.mac</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleName</key><string>Secret Chat Native</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${BUILD}</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep --sign - "$APP"
          ditto -c -k --keepParent "$APP" "out/SecretChat-native-macos-${VERSION}-universal.app.zip"
          rm -rf "$APP"
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: native-macos
          path: out/*

  # Windows: all three CPU architectures (x64, x86, arm64). Built with VS MSBuild
  # (the WinUI PRI task is not in the bare dotnet SDK). x86/arm64 are cross-published
  # from the x64 runner.
  windows:
    name: Windows WinUI 3 (${{ matrix.rid }})
    runs-on: windows-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, platform: x64 }
          - { rid: win-x86, platform: x86 }
          - { rid: win-arm64, platform: arm64 }
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # WinUI3 PRI/MSIX MSBuild tasks ship with Visual Studio's MSBuild, not the bare
      # dotnet SDK. Build the WinUI app with VS MSBuild.
      - uses: microsoft/setup-msbuild@v2

      - name: Run E2E golden-vector tests
        working-directory: desktop-native/windows
        run: dotnet test SecretChat.Windows.Tests/SecretChat.Windows.Tests.csproj -c Release

      # Use the `-restore` SWITCH so NuGet brings in the WinUI markup-compiler targets
      # before Publish (a target-list restore evaluates the project too early and the
      # *.g.cs never generate).
      - name: Publish unpackaged app (VS MSBuild)
        working-directory: desktop-native/windows/SecretChat.Windows
        run: msbuild SecretChat.Windows.csproj -restore -t:Publish -p:Configuration=Release -p:Platform=${{ matrix.platform }} -p:RuntimeIdentifier=${{ matrix.rid }} -p:SelfContained=true -p:WindowsPackageType=None -p:PublishDir=publish\

      - name: Diagnose generated bindings (on failure)
        if: failure()
        shell: pwsh
        working-directory: desktop-native/windows/SecretChat.Windows
        run: |
          $g = Get-ChildItem -Recurse obj -Filter MainWindow.g.cs -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $g) { Write-Host "no MainWindow.g.cs found"; exit 0 }
          Write-Host "=== $($g.FullName) lines 6790-7090 ==="
          $lines = Get-Content $g.FullName
          for ($i = 6789; $i -lt [Math]::Min(7090, $lines.Count); $i++) {
            "{0,5}: {1}" -f ($i+1), $lines[$i]
          }

      - name: Package zip
        shell: pwsh
        run: |
          $version = [xml](Get-Content desktop-native/windows/SecretChat.Windows/SecretChat.Windows.csproj)
          $displayVersion = $version.Project.PropertyGroup.ApplicationDisplayVersion
          New-Item -ItemType Directory -Force out | Out-Null
          Compress-Archive -Path desktop-native/windows/SecretChat.Windows/publish/* -DestinationPath "out/SecretChat-native-windows-$displayVersion-${{ matrix.rid }}.zip" -Force
          Get-ChildItem out

      - uses: actions/upload-artifact@v4
        with:
          name: native-windows-${{ matrix.rid }}
          path: out/*

  # Linux: x86_64 + aarch64, each built natively on its own runner (cross-compiling a
  # GTK4 app is impractical; GitHub provides arm64 Linux runners).
  linux:
    name: Linux GTK4 (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64 }
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}

      - name: Install GTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libgtk-4-dev libadwaita-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        working-directory: desktop-native/linux
        run: cargo build --release

      - name: Run E2E golden-vector tests
        working-directory: desktop-native/linux
        run: cargo test --release

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^version = "[^"]+"' desktop-native/linux/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          PKG="SecretChat-native-linux-${VERSION}-${{ matrix.arch }}"
          mkdir -p "out/${PKG}/bin" "out/${PKG}/share/applications"
          cp desktop-native/linux/target/release/secret-chat-linux "out/${PKG}/bin/secret-chat-linux"
          cat > "out/${PKG}/share/applications/com.secretchat.NativeLinux.desktop" <<DESKTOP
          [Desktop Entry]
          Type=Application
          Name=Secret Chat Native
          Exec=secret-chat-linux
          Categories=Network;Chat;InstantMessaging;
          DESKTOP
          tar -C out -czf "out/${PKG}.tar.gz" "${PKG}"
          rm -rf "out/${PKG}"
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-${{ matrix.arch }}
          path: out/*

  release:
    name: Publish Native Desktop Release
    needs: [macos, windows, linux]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -laR dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: native-desktop-${{ env.SRC_REF }}-b${{ github.run_number }}
          name: "Secret Chat Native Desktop ${{ env.SRC_REF }} build ${{ github.run_number }}"
          body: |
            Native desktop packaging for all CPU architectures.

            - macOS: universal (arm64 + x86_64) .app
            - Windows: win-x64 / win-x86 / win-arm64 (self-contained)
            - Linux: x86_64 / aarch64 (GTK4)

            Each platform's build runs the E2E golden-vector tests
            (swift test / dotnet test / cargo test) — byte-exact crypto across all.

            Source ref: `${{ env.SRC_REF }}`
          files: dist/**
