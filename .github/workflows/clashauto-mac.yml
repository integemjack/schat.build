# 在 schat.build（已配好 Developer ID 签名/公证 secret）里构建 ClashrAuto/clashauto 的 macOS
# 通用包，签名+公证后发布到 clashauto 仓库的 Release。避免把证书 secret 复制到 clashauto。
#
# 需要的 secret（本仓库 integemjack/schat.build）：
#   MACOS_CERT_P12 / MACOS_CERT_PW / MACOS_NOTARY_KEY / MACOS_NOTARY_KEY_ID / MACOS_NOTARY_ISSUER  （已有）
#   CLASHAUTO_RELEASE_TOKEN  —— 对 ClashrAuto/clashauto 有 contents:write 的 PAT（需新增）
name: clashauto macOS (signed)

on:
  # 向本分支(clashauto-mac)推提交即触发——clashauto 仓库 push 到 master 后，其 CI 会用
  # PAT 向这里推一个空提交来触发本次 mac 打包（inputs.ref 为空 → 下方 checkout 回退到
  # clashauto 的 master，即刚发布的 release commit）。保留 workflow_dispatch 供手动指定 ref。
  push:
    branches: [clashauto-mac]
  workflow_dispatch:
    inputs:
      ref:
        description: "要构建的 clashauto 分支/commit"
        default: "master"
        required: false

env:
  QT_VERSION: 6.8.3
  BUILD_DIR: build-release
  RUNTIME_RELEASE_TAG: v2.5.7
  RUNTIME_LINUX_ASSET: clash-auto-amd64-2.5.7.zip

jobs:
  clashauto-macos:
    name: clashauto macOS universal (signed + notarized)
    runs-on: macos-14
    steps:
      - name: Checkout clashauto
        uses: actions/checkout@v4
        with:
          repository: ClashrAuto/clashauto
          ref: ${{ github.event.inputs.ref || 'master' }}
          fetch-depth: 0

      - name: Resolve build version
        shell: bash
        run: |
          set -euo pipefail
          base="$(sed -nE 's/.*project[[:space:]]*\([[:space:]]*[^ ]+[[:space:]]+VERSION[[:space:]]+([0-9]+(\.[0-9]+){1,3}).*/\1/p' clashauto-c++/CMakeLists.txt | head -n 1)"
          [ -n "$base" ] || { echo "Cannot find project VERSION"; exit 1; }
          major="$(echo "$base" | cut -d. -f1)"; minor="$(echo "$base" | cut -d. -f2)"; [ -n "$minor" ] || minor=0
          version="${major}.${minor}.$(git rev-list --count HEAD)"
          { echo "APP_VERSION=$version"; echo "RELEASE_TAG=v$version"; } >> "$GITHUB_ENV"
          echo "clashauto version: $version"

      - name: Download runtime resources
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/ClashrAuto/Clashr-Auto-Desktop/releases/download/${RUNTIME_RELEASE_TAG}/${RUNTIME_LINUX_ASSET}"
          zip_path="${RUNNER_TEMP}/${RUNTIME_LINUX_ASSET}"
          curl -L --fail --retry 3 -o "$zip_path" "$url"
          rm -rf Clashr-Auto; mkdir -p Clashr-Auto
          python3 - "$zip_path" <<'PY'
          import pathlib, sys, zipfile
          zip_path = pathlib.Path(sys.argv[1])
          target_root = pathlib.Path("Clashr-Auto")
          prefixes = ("config/", "language/")
          with zipfile.ZipFile(zip_path) as archive:
              for entry in archive.infolist():
                  name = entry.filename.replace("\\", "/")
                  if not (name == "version" or name.startswith(prefixes)):
                      continue
                  target = target_root / name
                  if entry.is_dir():
                      target.mkdir(parents=True, exist_ok=True); continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(entry) as src, target.open("wb") as dst:
                      dst.write(src.read())
          PY
          mkdir -p Clashr-Auto/command/clash
          test -f Clashr-Auto/config/config.yaml

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install ninja
          python3 -m pip install --user aqtinstall pillow \
            || python3 -m pip install --user --break-system-packages aqtinstall pillow

      - name: Install Qt (universal)
        shell: bash
        run: |
          set -euo pipefail
          python3 -m aqt install-qt mac desktop "$QT_VERSION" clang_64 -O "$HOME/Qt"
          echo "QT_ROOT=$HOME/Qt/$QT_VERSION/macos" >> "$GITHUB_ENV"

      - name: Generate icon.icns
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from PIL import Image
          import pathlib
          ico = Image.open("clashauto-c++/assets/icon.ico")
          sizes = sorted(ico.info.get("sizes") or {ico.size})
          ico.size = sizes[-1]; ico.load()
          base = ico.convert("RGBA")
          out = pathlib.Path("icon.iconset"); out.mkdir(exist_ok=True)
          for s in (16, 32, 128, 256, 512):
              base.resize((s, s), Image.LANCZOS).save(out / f"icon_{s}x{s}.png")
              base.resize((s * 2, s * 2), Image.LANCZOS).save(out / f"icon_{s}x{s}@2x.png")
          PY
          iconutil -c icns -o clashauto-c++/assets/icon.icns icon.iconset

      - name: Configure
        shell: bash
        run: |
          cmake -S clashauto-c++ -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPP_VERSION="$APP_VERSION" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0

      - name: Build
        shell: bash
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Verify universal binary
        shell: bash
        run: |
          set -euo pipefail
          bin="$BUILD_DIR/Clash Auto.app/Contents/MacOS/Clash Auto"
          lipo -archs "$bin" | grep -q x86_64
          lipo -archs "$bin" | grep -q arm64

      - name: Import Developer ID signing cert
        id: signcert
        shell: bash
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PW }}
        run: |
          set -euo pipefail
          if [ -z "${CERT_P12:-}" ]; then
            echo "MACOS_CERT_P12 未设置 — 无法签名（本工作流要求真签名）"; exit 1
          fi
          KC="$RUNNER_TEMP/sign.keychain-db"; KPW="$(openssl rand -base64 18)"
          security create-keychain -p "$KPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KPW" "$KC"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "${CERT_PW:-}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPW" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          IDENTITY=$(security find-identity -v -p codesigning "$KC" | grep -m1 "Developer ID Application" | sed -E 's/.*"(.*)".*/\1/')
          rm -f "$RUNNER_TEMP/cert.p12"
          [ -n "$IDENTITY" ] || { echo "证书里没有 Developer ID Application 身份"; exit 1; }
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "imported identity: $IDENTITY"

      - name: Stage app bundle (embed helper + inside-out sign)
        shell: bash
        env:
          SIGN_IDENTITY: ${{ steps.signcert.outputs.identity }}
        run: |
          set -euo pipefail
          APP="$BUILD_DIR/Clash Auto.app"
          # QML 前端：必须 -qmldir 指向 .qml 源目录，macdeployqt 才会把 Qt Quick 运行时
          # (Qt6Quick / QtQuick.Controls[Basic] / Layouts / Templates / Window 插件) 部署进 bundle，
          # 否则签名包因缺 QML 运行时无法启动。
          "$QT_ROOT/bin/macdeployqt" "$APP" -qmldir="clashauto-c++/qml" -verbose=1

          # 重新嵌入特权 helper 与 launchd plist（macdeployqt 之后，避免被改）
          mkdir -p "$APP/Contents/Library/LaunchDaemons"
          cp "$BUILD_DIR/com.yuehongsun.auto.helper" "$APP/Contents/MacOS/com.yuehongsun.auto.helper"
          cp "clashauto-c++/helper/com.yuehongsun.auto.helper.plist" "$APP/Contents/Library/LaunchDaemons/"
          lipo -archs "$APP/Contents/MacOS/com.yuehongsun.auto.helper"

          # 运行时资源进 bundle：Contents/Clashr-Auto
          mkdir -p "$APP/Contents/Clashr-Auto"
          for item in command config language version; do
            [ -e "Clashr-Auto/$item" ] && cp -a "Clashr-Auto/$item" "$APP/Contents/Clashr-Auto/"
          done
          test -f "$APP/Contents/Clashr-Auto/config/config.yaml"

          # 签名（硬化运行时 + 时间戳，公证必需）。关键：helper 必须用显式 -i 指定
          # identifier = com.yuehongsun.auto.helper（= launchd Label）。否则 codesign 会把可执行名
          # com.yuehongsun.auto.helper 末尾的「.helper」当扩展名剥掉，得到 identifier=com.yuehongsun.auto，
          # 与注册的 Label 不一致 → SMAppService daemon 一启动即被系统以 Launch Constraint Violation
          # 用 SIGKILL 杀掉，核心永远无法以 root 运行（应用侧 XPC 报「Couldn't communicate with a
          # helper application」并回退非 root）。
          HELPER="$APP/Contents/MacOS/com.yuehongsun.auto.helper"
          HELPER_ID="com.yuehongsun.auto.helper"
          # 1) --deep 一把签全（含 Qt frameworks）——但它会把 helper 的 identifier 又剥回 com.yuehongsun.auto
          codesign --force --deep --options runtime --timestamp --sign "$SIGN_IDENTITY" "$APP"
          # 2) 用显式 -i 单独重签 helper 纠正 identifier（这会改 helper 的 cdhash）
          codesign --force --options runtime --timestamp -i "$HELPER_ID" --sign "$SIGN_IDENTITY" "$HELPER"
          # 3) helper 变了 → 外层 app 封存过期，浅签一次 app 重新封存 helper 的新 cdhash（不加 --deep，避免再剥）
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP" && echo "codesign verify OK"
          codesign --verify --strict --verbose=2 "$HELPER" && echo "helper codesign verify OK"
          # 核对 helper 的 identifier 必须 = com.yuehongsun.auto.helper（= Label），否则仍会被 Launch Constraint 杀
          echo "helper identity:"; codesign -dvv "$HELPER" 2>&1 | grep -Ei 'Identifier|TeamIdentifier'
          codesign -dvv "$APP" 2>&1 | grep -Ei 'Authority|TeamIdentifier' || true

      - name: Create DMG + notarize + staple
        shell: bash
        env:
          NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          set -euo pipefail
          mkdir -p dist/dmgroot
          ditto "$BUILD_DIR/Clash Auto.app" "dist/dmgroot/Clash Auto.app"
          ln -s /Applications dist/dmgroot/Applications
          DMG="dist/ClashAuto-${APP_VERSION}-macos-universal.dmg"
          hdiutil create -volname "Clash Auto" -srcfolder dist/dmgroot -ov -format UDZO "$DMG"
          if [ -z "${NOTARY_KEY:-}" ]; then
            echo "缺 notary 凭据，无法公证"; exit 1
          fi
          echo "$NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/nkey.p8"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/nkey.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER" \
            --wait --timeout 45m
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG" && echo "notarized + stapled OK"
          rm -f "$RUNNER_TEMP/nkey.p8"

      # 无论如何都把签名+公证的 DMG 作为本 run 的 artifact 上传（无需任何跨仓库 token，直接下载即可测）
      - name: Upload signed DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClashAuto-macos-universal-signed
          path: dist/ClashAuto-*-macos-universal.dmg

      # 可选：若配置了对 ClashrAuto/clashauto 有 contents:write 的 PAT，则同时发布到其 Release
      - name: Publish to clashauto release (optional)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CLASHAUTO_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "未设置 CLASHAUTO_RELEASE_TOKEN —— 跳过发布到 clashauto release（DMG 已作为 artifact 上传，可直接下载）"
            exit 0
          fi
          DMG="dist/ClashAuto-${APP_VERSION}-macos-universal.dmg"
          test -f "$DMG"
          shasum -a 256 "$DMG" | awk '{print $1}' > "$DMG.sha256"
          # 必须落到 clashauto CI 建的那个 release 上：name="Clash Auto <ver>" 且标记 latest。
          # mac 客户端更新是 GET /releases/latest 读 tag_name、再从 latest 里挑 DMG——若这里
          # 另建一个标题为 "v<ver>"、非 latest 的 release，签名包就不在客户端能取到的 latest 上。
          if gh release view "$RELEASE_TAG" -R ClashrAuto/clashauto >/dev/null 2>&1; then
            # 已存在（多半是 clashauto CI 先建好的 "Clash Auto <ver>"）：不改名字，只确保仍是 latest。
            gh release edit "$RELEASE_TAG" -R ClashrAuto/clashauto --latest >/dev/null 2>&1 || true
          else
            # 尚未建：按与 clashauto CI 完全一致的命名新建，并显式标记 latest。
            gh release create "$RELEASE_TAG" -R ClashrAuto/clashauto \
              --title "Clash Auto ${APP_VERSION}" --latest \
              --notes "signed + notarized macOS build (built by schat.build)"
          fi
          gh release upload "$RELEASE_TAG" "$DMG" "$DMG.sha256" --clobber -R ClashrAuto/clashauto
          echo "uploaded $DMG to ClashrAuto/clashauto release 'Clash Auto ${APP_VERSION}' (${RELEASE_TAG}, latest, mac asset clobbered)"
