name: Build All

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ireoo/Secret-Chat 的分支或标签"
        required: false
        # 源仓库的开发分支是版本分支(v9.12 / v9.13 …),`main` 是旧结构、缺 desktop/desktop-qt
        # 与 chatserver。每次版本分支切换时这里(及 qt-desktop.yml)要同步,或把 main 合到最新。
        default: "v9.12"
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  SRC_REPO: Ireoo/Secret-Chat
  SRC_REF: ${{ github.event.inputs.ref || 'v9.12' }}
  # GitHub-hosted runners reach github.com directly — skip the gh-proxy.com mirror (China-only)
  # that third_party/fetch_deps.sh defaults to (it's slow/blocked from the runners).
  SCHAT_GH_MIRROR: https://github.com
  SCHAT_RAW_MIRROR: https://raw.githubusercontent.com

jobs:
  # iOS 不在 CI 构建——本地 archive 后直传 TestFlight（见项目根 CLAUDE.md / 记忆）。
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
      - name: Build APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace
      - name: Collect APKs
        run: |
          mkdir -p out
          VER=$(grep -oE 'versionName = "[^"]+"' android/app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          cp android/app/build/outputs/apk/debug/*.apk out/SecretChat-android-debug.apk
          cp android/app/build/outputs/apk/release/*.apk "out/SecretChat-android-release-${VER}.apk" || true
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: out/*.apk

  # Qt6/QML desktop (desktop/desktop-qt) — replaces the deleted Electron client. This "Build
  # All" leg builds one native-arch package per OS as a quick check; the full multi-arch
  # release (macOS arm64+x86_64, Windows x64, Linux x86_64+aarch64+armhf) is qt-desktop.yml.
  desktop:
    name: Qt Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 70
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}

      - name: Install Qt6 + codec deps (macOS)
        if: runner.os == 'macOS'
        run: brew install qt cmake ninja pkg-config opus openh264 libsodium openssl@3

      - name: Install Qt6 + codec deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config g++ git curl ca-certificates \
            qt6-base-dev qt6-declarative-dev qt6-multimedia-dev \
            qml6-module-qtquick qml6-module-qtquick-controls qml6-module-qtquick-layouts \
            qml6-module-qtquick-window qml6-module-qtquick-dialogs qml6-module-qtquick-shapes \
            libopus-dev libopenh264-dev libsodium-dev libssl-dev zlib1g-dev libsrtp2-dev

      - name: Install Qt6 (MinGW) (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          arch: win64_mingw
          modules: qtmultimedia
          tools: tools_mingw1310
          add-tools-to-path: true

      - name: Fetch third-party deps
        working-directory: desktop/desktop-qt
        shell: bash
        run: bash third_party/fetch_deps.sh

      - name: Configure + build (Release)
        working-directory: desktop/desktop-qt
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix qt)"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          else
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build -j

      - name: Package
        working-directory: desktop/desktop-qt
        shell: bash
        run: |
          set -euo pipefail
          VER=$(grep -E 'kVersion = "[^"]+"' core/include/schat/Version.h | sed -E 's/.*"([^"]+)".*/\1/')
          mkdir -p out
          if [ "$RUNNER_OS" = "macOS" ]; then
            APP="build/app-qt/secretchat-qt.app"
            "$(brew --prefix qt)/bin/macdeployqt" "$APP" -qmldir=app-qt/qml
            ditto -c -k --keepParent "$APP" "out/SecretChat-qt-macos-${VER}.app.zip"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            DEST="SecretChat-qt-windows-${VER}-x64"; mkdir -p "pkg/$DEST"
            cp build/app-qt/secretchat-qt.exe "pkg/$DEST/"
            "$QT_ROOT_DIR/bin/windeployqt.exe" --qmldir app-qt/qml --release --no-translations "pkg/$DEST/secretchat-qt.exe"
            powershell -Command "Compress-Archive -Path 'pkg/$DEST/*' -DestinationPath 'out/$DEST.zip' -Force"
          else
            PKG="SecretChat-qt-linux-${VER}-x86_64"; mkdir -p "out/$PKG/bin"
            cp build/app-qt/secretchat-qt "out/$PKG/bin/"; chmod +x "out/$PKG/bin/secretchat-qt"
            tar -C out -czf "out/$PKG.tar.gz" "$PKG"; rm -rf "out/$PKG"
          fi
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: desktop/desktop-qt/out/*

  server:
    name: chatserver (single binary, linux amd64+arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: chatserver/go.sum
      - name: Build
        # chatserver is pure Go (pgx + modernc SQLite), so CGO_ENABLED=0 gives static
        # binaries and easy cross-compile to arm64.
        working-directory: chatserver
        run: |
          mkdir -p ../out
          CGO_ENABLED=0 GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o ../out/schat-chatserver-linux-amd64 .
          CGO_ENABLED=0 GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o ../out/schat-chatserver-linux-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: server
          path: out/*

  docker:
    name: chatserver Docker → GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
      # chatserver's multi-stage Dockerfile compiles Go in-container and does NOT COPY
      # config.yaml into the image (config is mounted at runtime via CHATSERVER_CONFIG), so
      # no placeholder seeding is needed (unlike the deleted nodeServer).
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        env:
          # 不要上传 build-push-action 的 .dockerbuild 记录工件——它会成为 release 任务
          # download-artifact 的一个额外（失败时为 0 字节）工件，拖垮整个 Release。
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: chatserver
          push: true
          tags: |
            ghcr.io/integemjack/schat-server:latest
            ghcr.io/integemjack/schat-server:${{ env.SRC_REF }}-b${{ github.run_number }}

  m5core2:
    name: M5Stack Core2 (firmware)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-m5core2-${{ hashFiles('ESP32/m5core2/platformio.ini') }}
      - name: Build firmware (base env)
        working-directory: ESP32/m5core2
        # 普通 env(m5stack-core2):预编译核,纯 pio run,产 OTA-able firmware.bin。
        # 唤醒词/深度 light sleep 的 -ww 版需 model 分区(OTA 刷不了分区,必须 USB 首刷)+
        # custom_sdkconfig IDF 重编,是本地 ./build_pm.sh ww 烧录件,刻意不进 CI。
        run: pio run -e m5stack-core2
      - name: Collect firmware
        run: |
          mkdir -p out
          cp ESP32/m5core2/.pio/build/m5stack-core2/firmware.bin out/SecretChat-m5core2-firmware.bin
          ls -la out
      - uses: actions/upload-artifact@v4
        with:
          name: m5core2
          path: out/*

  release:
    name: Publish Release
    needs: [android, desktop, server, docker, m5core2]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (changelog 用)
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
          fetch-depth: 0
      - name: Build changelog (自上个 release 到本次的提交)
        id: cl
        run: |
          SRC_SHA=$(git rev-parse HEAD)
          PREV=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/releases?per_page=20" | grep -oE 'src-sha:[0-9a-f]{7,40}' | head -1 | sed 's/src-sha://')
          if [ -n "$PREV" ] && git cat-file -e "${PREV}^{commit}" 2>/dev/null; then
            LOG=$(git log "${PREV}..HEAD" --no-merges --pretty='- %s' | head -80)
          else
            LOG=$(git log -n 30 --no-merges --pretty='- %s')
          fi
          [ -z "$LOG" ] && LOG="- (无新提交)"
          {
            echo "body<<__CL__"
            echo "## 更新内容(自上个版本)"
            echo ""
            echo "$LOG"
            echo ""
            echo "<sub>build #${{ github.run_number }} · src-sha:${SRC_SHA}</sub>"
            echo "__CL__"
          } >> "$GITHUB_OUTPUT"
      # docker 任务已禁用 .dockerbuild 记录工件上传，这里只剩各端真实产物
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -laR dist || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.SRC_REF }}-b${{ github.run_number }}
          name: "Secret Chat ${{ env.SRC_REF }} build ${{ github.run_number }}"
          body: ${{ steps.cl.outputs.body }}
          files: dist/**
