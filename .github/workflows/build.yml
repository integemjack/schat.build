name: Build All

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ireoo/Secret-Chat 的分支或标签"
        required: false
        # 打包只用 `main`:版本分支(v9.12 / v9.13 …)开发完成后 fast-forward 合并进 main,
        # 发布一律从 main 打(main 已含 desktop/desktop-qt 与 chatserver)。要临时打某个版本分支,
        # 用 workflow_dispatch 显式传 ref 覆盖即可。
        default: "main"
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  SRC_REPO: Ireoo/Secret-Chat
  SRC_REF: ${{ github.event.inputs.ref || 'main' }}
  # GitHub-hosted runners reach github.com directly — skip the gh-proxy.com mirror (China-only)
  # that third_party/fetch_deps.sh defaults to (it's slow/blocked from the runners).
  SCHAT_GH_MIRROR: https://github.com
  SCHAT_RAW_MIRROR: https://raw.githubusercontent.com

jobs:
  # iOS 不在 CI 构建——本地 archive 后直传 TestFlight（见项目根 CLAUDE.md / 记忆）。
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
      - name: Build APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace
      - name: Collect APKs
        run: |
          mkdir -p out
          VER=$(grep -oE 'versionName = "[^"]+"' android/app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          cp android/app/build/outputs/apk/debug/*.apk out/SChat-android-debug.apk
          cp android/app/build/outputs/apk/release/*.apk "out/SChat-android-release-${VER}.apk" || true
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: out/*.apk

  # Desktop packaging — replaces the deleted Electron client. mac 有**两条并存的腿**:原生
  # SwiftUI 苹果特效版(desktop/macos, arm64, macOS 14+)+ Qt/QML 通用兼容版(desktop/desktop-qt,
  # arm64+x86_64, minos 12.0 → macOS 12/13+ 与 Intel);Windows/Linux 是 Qt6/QML(NSIS via MSYS2 /
  # .deb + AppImage via Debian trixie)。四条腿都住在 REUSABLE qt-desktop.yml 里,在这里被调用,
  # so the combined release below bundles every desktop artifact (macos-swiftui(SwiftUI mac 包) /
  # qt-macos-universal(Qt 通用 mac 包) / qt-windows-x64 / qt-linux-{x86_64,aarch64,armhf})。
  # release 靠 download-artifact merge-multiple 自动收录本次 run 的全部 artifact,故加一条腿
  # 无需改 release job。Standalone `qt-desktop.yml` dispatch still runs the same build for tests.
  desktop:
    name: Desktop (mac SwiftUI / Win+Linux Qt)
    uses: ./.github/workflows/qt-desktop.yml
    permissions:
      contents: write
    with:
      # env context isn't available in a reusable call's `with:` — inline the ref default.
      ref: ${{ github.event.inputs.ref || 'main' }}
    secrets: inherit

  server:
    name: chatserver (single binary, linux amd64+arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: chatserver/go.sum
      - name: Build
        # chatserver is pure Go (pgx + modernc SQLite), so CGO_ENABLED=0 gives static
        # binaries and easy cross-compile to arm64.
        working-directory: chatserver
        run: |
          mkdir -p ../out
          CGO_ENABLED=0 GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o ../out/SChat-server-linux-amd64 .
          CGO_ENABLED=0 GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o ../out/SChat-server-linux-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: server
          path: out/*

  docker:
    name: chatserver Docker → GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
      # chatserver's multi-stage Dockerfile compiles Go in-container and does NOT COPY
      # config.yaml into the image (config is mounted at runtime via CHATSERVER_CONFIG), so
      # no placeholder seeding is needed (unlike the deleted nodeServer).
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        env:
          # 不要上传 build-push-action 的 .dockerbuild 记录工件——它会成为 release 任务
          # download-artifact 的一个额外（失败时为 0 字节）工件，拖垮整个 Release。
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: chatserver
          push: true
          tags: |
            ghcr.io/integemjack/schat-server:latest
            ghcr.io/integemjack/schat-server:${{ env.SRC_REF }}-b${{ github.run_number }}

  m5core2:
    name: M5Stack Core2 (firmware)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-m5core2-${{ hashFiles('ESP32/m5core2/platformio.ini') }}
      - name: Build firmware (base env)
        working-directory: ESP32/m5core2
        # 普通 env(m5stack-core2):预编译核,纯 pio run,产 OTA-able firmware.bin。
        # 唤醒词/深度 light sleep 的 -ww 版需 model 分区(OTA 刷不了分区,必须 USB 首刷)+
        # custom_sdkconfig IDF 重编,是本地 ./build_pm.sh ww 烧录件,刻意不进 CI。
        run: pio run -e m5stack-core2
      - name: Collect firmware
        run: |
          mkdir -p out
          cp ESP32/m5core2/.pio/build/m5stack-core2/firmware.bin out/SChat-m5core2-firmware.bin
          ls -la out
      - uses: actions/upload-artifact@v4
        with:
          name: m5core2
          path: out/*

  release:
    name: Publish Release
    needs: [android, desktop, server, docker, m5core2]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (changelog 用)
        uses: actions/checkout@v4
        with:
          repository: Ireoo/Secret-Chat
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.SRC_REPO_TOKEN }}
          fetch-depth: 0
      - name: Build changelog (自上个 release 到本次的提交)
        id: cl
        run: |
          SRC_SHA=$(git rev-parse HEAD)
          PREV=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/releases?per_page=20" | grep -oE 'src-sha:[0-9a-f]{7,40}' | head -1 | sed 's/src-sha://')
          if [ -n "$PREV" ] && git cat-file -e "${PREV}^{commit}" 2>/dev/null; then
            LOG=$(git log "${PREV}..HEAD" --no-merges --pretty='- %s' | head -80)
          else
            LOG=$(git log -n 30 --no-merges --pretty='- %s')
          fi
          [ -z "$LOG" ] && LOG="- (无新提交)"
          {
            echo "body<<__CL__"
            echo "## 更新内容(自上个版本)"
            echo ""
            echo "$LOG"
            echo ""
            echo "<sub>build #${{ github.run_number }} · src-sha:${SRC_SHA}</sub>"
            echo "__CL__"
          } >> "$GITHUB_OUTPUT"
      # docker 任务已禁用 .dockerbuild 记录工件上传，这里只剩各端真实产物
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -laR dist || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.SRC_REF }}-b${{ github.run_number }}
          name: "SChat ${{ env.SRC_REF }} build ${{ github.run_number }}"
          body: ${{ steps.cl.outputs.body }}
          files: dist/**

      # ── Self-hosted update distribution (Step 2) — sign each desktop/android asset
      # with the official Ed25519 key, POST it to jiami.chat's release-upload endpoint,
      # and attach a combined signed manifest to THIS release as a GitHub fallback
      # mirror (docs/update_distribution_plan.md §6 item 12 + decision #11).
      # ALWAYS continue-on-error: a signing/upload hiccup must never fail the release.
      # The release job checked out the SOURCE repo into the workspace, so the CI repo
      # (schat.build, where the signer lives) is checked out into a subpath.
      - name: Checkout schat.build (release signer)
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          path: _ci
      - name: Setup Go (release signer)
        if: always()
        continue-on-error: true
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false # signer is stdlib-only (no go.sum); nothing to cache
      - name: Sign + publish desktop/android release assets to jiami.chat + write manifest
        if: always()
        continue-on-error: true
        env:
          RELEASE_SIGN_ED25519_KEY: ${{ secrets.RELEASE_SIGN_ED25519_KEY }}
          RELEASE_UPLOAD_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN }}
          # release.jiami.chat is a DNS-only (grey-cloud) record → direct to the origin (nginx),
          # bypassing Cloudflare's 100 MiB request-body cap so the >100 MiB assets (android APK,
          # qt-mac universal) can upload too. Verified from a clean host: it resolves to the origin
          # (server: nginx, no cloudflare edge) AND presents a publicly-trusted cert, so TLS
          # verification stays ON. (The signer supports UPDATE_UPLOAD_INSECURE_TLS=1 as an escape
          # hatch if a future bypass host ever serves a self-signed cert; not needed here.)
          UPDATE_UPLOAD_URL: https://release.jiami.chat/desktop/releases/upload
        run: |
          cd _ci/tools/release-signer
          go run . -dir "$GITHUB_WORKSPACE/dist" -manifest "$GITHUB_WORKSPACE/schat-update-manifest.json"
      - name: Attach signed manifest to GitHub release (signed fallback mirror)
        if: always()
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.SRC_REF }}-b${{ github.run_number }}
          files: schat-update-manifest.json

  # 任何构建腿失败 → 在本仓库(schat.build)开/追评一个 issue;恢复绿 → 自动关闭。
  # 单 job 汇总:列本次 run 的全部 job(含 desktop 复用工作流的子腿 macOS/Windows/Linux),
  # 按 job 名去掉 reusable 的容器腿,用 issue body 里的隐藏指纹标记 `<!-- schat-ci-fp: build/<slug> -->`
  # 去重(每条腿至多一个 open issue,后续失败追评论)。issue 开在本仓库,GITHUB_TOKEN 即够,无需 PAT。
  report-failures:
    name: Report build failures
    needs: [android, desktop, server, docker, m5core2]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
      contents: read
    steps:
      - name: Open/close issues by leg result
        uses: actions/github-script@v7
        env:
          SRC_REF: ${{ env.SRC_REF }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const ref = process.env.SRC_REF || 'main';
            const SELF = 'Report build failures';

            // 本次 run 的全部 job —— 含 reusable(desktop)工作流的子腿。
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner, repo, run_id: runId, per_page: 100,
            });
            const legs = jobs.filter(j => j.name !== SELF && !j.name.startsWith(SELF + ' /'));
            const names = legs.map(l => l.name);
            // reusable 容器腿的名字是其子腿名的前缀(`X / Y`)——只报最具体的子腿,不报容器。
            const isContainer = (n) => names.some(o => o !== n && o.startsWith(n + ' / '));

            async function ensureLabel(name, color) {
              try { await github.rest.issues.getLabel({ owner, repo, name }); }
              catch (e) { try { await github.rest.issues.createLabel({ owner, repo, name, color }); } catch (e2) {} }
            }
            await ensureLabel('ci-failure', 'd73a4a');

            // 直接列(非 search,无索引延迟),按 body 里的隐藏指纹去重。
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, labels: 'ci-failure', state: 'all', per_page: 100,
            });
            const findByFp = (fp) => existing.find(i => (i.body || '').includes(`<!-- schat-ci-fp: ${fp} -->`));

            for (const leg of legs) {
              if (isContainer(leg.name)) continue;
              if (!['success', 'failure'].includes(leg.conclusion)) continue; // 跳过 skipped/cancelled/进行中
              const slug = leg.name.replace(/[^a-zA-Z0-9]+/g, '-').replace(/(^-|-$)/g, '').toLowerCase();
              const fp = `build/${slug}`;
              const marker = `<!-- schat-ci-fp: ${fp} -->`;
              const issue = findByFp(fp);
              if (leg.conclusion === 'failure') {
                const title = `[CI] 构建失败: ${leg.name}`;
                const body = [
                  `**腿**: \`${leg.name}\``,
                  `**分支**: \`${ref}\``,
                  `**Run**: ${runUrl}`,
                  `**构建号**: #${context.runNumber}`,
                  ``,
                  `_同一条腿的后续失败会在此追加评论,恢复绿后自动关闭。_`,
                  ``,
                  marker,
                ].join('\n');
                if (issue) {
                  if (issue.state === 'closed') {
                    await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'open' });
                  }
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: issue.number,
                    body: `🔴 再次失败 · build #${context.runNumber} · ${runUrl}`,
                  });
                } else {
                  await github.rest.issues.create({ owner, repo, title, body, labels: ['ci-failure'] });
                }
              } else if (issue && issue.state === 'open') {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `✅ 已恢复 · build #${context.runNumber} · ${runUrl} — 自动关闭。`,
                });
                await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed' });
              }
            }

